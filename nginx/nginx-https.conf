worker_processes 4;

events {
    worker_connections 1024;
}

http {
    upstream time-recorder-server {
        server time-recorder-server:8000;
    }

    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        ssl_certificate     /etc/letsencrypt/live/tr.akselos.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tr.akselos.com/privkey.pem;
        server_name tr.akselos.com;
        root  /usr/share/nginx/html;
        include /etc/nginx/mime.types;

        # route all other requests to the index for react router
        location / {
            try_files $uri /index.html;
        }

        location /api {
            proxy_pass http://time-recorder-server;
            proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection 'upgrade';
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
        }
    }
}
